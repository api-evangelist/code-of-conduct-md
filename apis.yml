description: >-
  CODE_OF_CONDUCT.md is the de-facto repository file used by open-source
  projects on GitHub, GitLab, and similar platforms to declare community
  standards, acceptable behavior, and enforcement procedures for project
  participants. The most widely adopted text dropped into this file is the
  Contributor Covenant, currently at version 2.1, maintained by the
  Organization for Ethical Source. GitHub surfaces a CODE_OF_CONDUCT.md
  located in the repo root, .github/, or docs/ directory in its Community
  Standards checklist and links to it from issue templates. The file is
  plain Markdown and has no machine-readable schema, but it is structurally
  consistent across the dominant template (Contributor Covenant) and a small
  number of alternatives (Citizen Code of Conduct, Django Code of Conduct,
  Mozilla Community Participation Guidelines).
